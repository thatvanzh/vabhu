<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vabhu Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; width: 100vw; overflow: hidden; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); display: flex; flex-direction: column; }
        
        /* DEBUG BOX (Remove later) */
        #status-log {
            position: absolute; top: 0; left: 0; width: 100%; height: 20px;
            background: rgba(0,0,0,0.8); color: lime; font-size: 10px;
            z-index: 9999; padding: 2px 10px; display: flex; align-items: center;
        }

        /* CHAT AREA */
        .chat-container { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; padding-top: 30px; }
        .message { padding: 10px 15px; margin: 5px 0; border-radius: 20px; max-width: 80%; font-size: 15px; word-wrap: break-word; }
        .my-message { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other-message { background: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        .update { text-align: center; color: #888; font-size: 12px; margin: 10px 0; }

        /* INPUT AREA */
        .input-area { height: 60px; background: white; display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 0 15px; font-size: 16px; outline: none; }
        button { margin-left: 10px; padding: 0 20px; border-radius: 20px; border: none; background: #007aff; color: white; font-weight: bold; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; padding: 20px; border-radius: 15px; text-align: center; width: 80%; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; }
        .modal button { width: 100%; padding: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="status-log">Status: Loading...</div>

    <div class="modal" id="join-modal">
        <div class="modal-box">
            <h3>Enter Vabhu</h3>
            <input type="text" id="username-input" placeholder="Your Name">
            <button id="join-btn">Join</button>
        </div>
    </div>

    <div class="chat-container" id="messages"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // DEBUG FUNCTION
        const logBox = document.getElementById('status-log');
        function log(msg) {
            logBox.innerText = "Status: " + msg;
            console.log(msg);
        }

        try {
            const socket = io(); // Connect to Render Server
            const messages = document.getElementById('messages');
            const input = document.getElementById('message-input');
            const joinModal = document.getElementById('join-modal');
            let myName = "";

            // 1. CONNECTION CHECK
            socket.on('connect', () => {
                log("Connected! ID: " + socket.id);
            });

            socket.on('connect_error', (err) => {
                log("Error: " + err.message);
            });

            // 2. JOIN
            document.getElementById('join-btn').onclick = function() {
                myName = document.getElementById('username-input').value;
                if(myName) {
                    socket.emit('newuser', myName);
                    joinModal.style.display = 'none';
                    log("Joined as " + myName);
                }
            };

            // 3. SEND
            document.getElementById('send-btn').onclick = sendMessage;
            
            function sendMessage() {
                if(input.value) {
                    // Show my message
                    addMessage('my', myName, input.value);
                    // Send to server
                    socket.emit('chat', { username: myName, text: input.value });
                    input.value = '';
                }
            }

            // 4. RECEIVE
            socket.on('chat', (data) => {
                addMessage('other', data.username, data.text);
            });

            socket.on('update', (text) => {
                let div = document.createElement('div');
                div.className = 'update';
                div.innerText = text;
                messages.appendChild(div);
            });

            function addMessage(type, user, text) {
                let div = document.createElement('div');
                div.className = 'message ' + (type === 'my' ? 'my-message' : 'other-message');
                div.innerText = user + ": " + text;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }

        } catch (e) {
            log("CRITICAL JS ERROR: " + e.message);
        }
    </script>
</body>
</html>
