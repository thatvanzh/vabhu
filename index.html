<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vabhu Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="glass-container">
        
        <div class="chat-header">
            <div class="logo-area">
                <img src="chatlogo2.png" alt="Vabhu" class="app-logo">
                <div class="app-info">
                    <h2>Vabhu</h2>
                    <p>Live Chat</p>
                </div>
            </div>
            <div class="online-indicator"></div>
        </div>

        <div class="messages-area" id="messages-container">
            </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type something sweet...">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <div class="modal-overlay" id="join-modal">
        <div class="glass-modal">
            <img src="chatlogo2.png" alt="Logo" class="modal-logo">
            <h3>Enter Vabhu</h3>
            <p>Please enter your name</p>
            <input type="text" id="username-input" placeholder="Your Name">
            <button id="join-btn">Start Chatting</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
