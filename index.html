    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vabhu Chat</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="glass-container">
        
        <div class="chat-header">
            <div class="logo-area">
                <img src="chatlogo2.png" alt="Vabhu Logo" class="app-logo">
                <div class="app-info">
                    <h2>Vabhu</h2>
                    <p>Welcome to Vabhu...</p>
                </div>
            </div>
            <div class="online-indicator"></div>
        </div>

        <div class="messages-area" id="messages-container">
            </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type something sweet...">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="join-modal">
        <div class="glass-modal">
            <img src="chatlogo2.png" alt="Logo" class="modal-logo">
            <h3>Enter Vabhu</h3>
            <p>Please enter your name to start</p>
            <input type="text" id="username-input" placeholder="Your Name">
            <button id="join-btn">Start Chatting</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
